version: '3.8'

services:
  # 🗄️ Banco de Dados Principal
  postgres:
    image: postgres:16-alpine
    container_name: kiribamba_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-kiribamba}
    ports:
      - "5432:5432"
    volumes:
      - kiribamba_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ⚡ Cache e Fila em Memória
  redis:
    image: redis:7-alpine
    container_name: kiribamba_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - kiribamba_redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 🚀 Backend (NestJS API)
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: kiribamba_api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres_password}@postgres:5432/${POSTGRES_DB:-kiribamba}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-kiribamba_super_secret_production_key_2026}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-7d}
      # Pode injetar OpenAI, Supabase, Minio aqui depois
    volumes:
      - kiribamba_uploads:/app/uploads

  # 💻 Frontend (React PWA + Nginx)
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: kiribamba_web
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:3001

volumes:
  kiribamba_pgdata:
  kiribamba_redisdata:
  kiribamba_uploads:
